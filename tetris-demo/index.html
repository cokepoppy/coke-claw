<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tetris Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <h1>俄罗斯方块</h1>
        <p class="hint">方向键左右移动，上键旋转，下键加速下落</p>
        <div class="stats">
          <div>分数：<span id="score">0</span></div>
          <div>消行：<span id="lines">0</span></div>
          <div>状态：<span id="status">未开始</span></div>
        </div>
        <button id="toggleBtn" type="button">开始</button>
      </section>

      <section class="board-wrap">
        <canvas id="board" width="300" height="600" aria-label="俄罗斯方块棋盘"></canvas>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
